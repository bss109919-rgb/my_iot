<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME IoT Control Panel</title>
    <style>
        /* ตั้งค่าพื้นฐานและพื้นหลัง */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #111a2e, #050810);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* กล่องควบคุมหลัก (Control Panel) */
        .panel {
            background: rgba(16, 25, 45, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 320px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* หัวข้อ */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #00f3ff;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
            letter-spacing: 1px;
        }
        .header p {
            color: #a0aec0;
            margin: 5px 0 0 0;
            font-size: 12px;
        }

        /* กล่องแต่ละแชนเนล */
        .channel-row {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        /* สไตล์ของปุ่มสวิตช์ (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a354d;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* เอฟเฟกต์เมื่อสวิตช์เปิด (ON) */
        input:checked + .slider {
            background-color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* เครดิตผู้พัฒนา */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 10px;
            color: #4a5568;
            line-height: 1.5;
        }
        .footer span {
            color: #00f3ff;
        }
    </style>
</head>
<body>

    <div class="panel">
        <div class="header">
            <h1>SMART HOME</h1>
            <p>ESP8266 IoT Control Panel</p>
        </div>

        <div class="channel-row">
            <div class="channel-info">
                <span>💡</span> ช่องที่ 1 (D1)
            </div>
            <label class="switch">
                <input type="checkbox" id="ch1">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info">
                <span>🔌</span> ช่องที่ 2 (D2)
            </div>
            <label class="switch">
                <input type="checkbox" id="ch2">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info">
                <span>📺</span> ช่องที่ 3 (D5)
            </div>
            <label class="switch">
                <input type="checkbox" id="ch3">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info">
                <span>❄️</span> ช่องที่ 4 (D6)
            </div>
            <label class="switch">
                <input type="checkbox" id="ch4">
                <span class="slider"></span>
            </label>
        </div>

        <div class="footer">
            <span>ผู้พัฒนาระบบ</span><br>
            Smart Home IoT Project<br>
            Real-Time Control via Firebase
        </div>
    </div>

    <script type="module">
        // 1. นำเข้า Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. ตั้งค่า Firebase Config ของคุณ (คัดลอกจาก Firebase Console)
        // ⚠️ ลบข้อมูลชุดนี้แล้วใส่ของคุณเอง
        const firebaseConfig = {
           apiKey: "AIzaSyCotwsHXPohDq45MS_XGpF6Nc_IdtZkhk4",
  authDomain: "myiot2026-29f47.firebaseapp.com",
            databaseURL: "https://myiot2026-29f47-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "myiot2026-29f47",
  storageBucket: "myiot2026-29f47.firebasestorage.app",
  messagingSenderId: "895684866223",
  appId: "1:895684866223:web:14c1e8fd99560c58f3645a"
        };

        // 3. เริ่มต้นการทำงานของ Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 4. สร้างฟังก์ชันเชื่อมปุ่มกับฐานข้อมูล
        const channels = [
            { id: 'ch1', dbPath: 'SmartHome/D1' },
            { id: 'ch2', dbPath: 'SmartHome/D2' },
            { id: 'ch3', dbPath: 'SmartHome/D5' },
            { id: 'ch4', dbPath: 'SmartHome/D6' }
        ];

        channels.forEach(channel => {
            const toggleElement = document.getElementById(channel.id);
            const dbRef = ref(db, channel.dbPath);

            // เมื่อมีการเปลี่ยนแปลงข้อมูลใน Firebase (เช่น บอร์ด ESP8266 อัปเดตสถานะ)
            // ให้มาอัปเดตปุ่มบนหน้าเว็บให้ตรงกัน (Real-time)
            onValue(dbRef, (snapshot) => {
                const state = snapshot.val();
                toggleElement.checked = (state === true || state === 1 || state === "ON");
            });

            // เมื่อผู้ใช้กดคลิกเปิด-ปิดสวิตช์บนหน้าเว็บ
            // ให้ส่งค่า (true/false) กลับไปที่ Firebase
            toggleElement.addEventListener('change', (event) => {
                const isChecked = event.target.checked;
                set(dbRef, isChecked)
                    .then(() => console.log(`${channel.id} set to ${isChecked}`))
                    .catch((error) => console.error("Error updating database:", error));
            });
        });
    </script>
</body>
</html>
